<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LLM Chat</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    padding: 15px;
    background: #020617;
    border-bottom: 1px solid #1e293b;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#headerRight {
    display: flex;
    gap: 12px;
    align-items: center;
}

#gear, #trash {
    cursor: pointer;
    font-size: 18px;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message {
    display: inline-block;
    width: fit-content;
    max-width: 70%;
    padding: 12px;
    border-radius: 10px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.user {
    background: #2563eb;
    margin-left: auto;
    align-self: flex-end;
}

.ai {
    background: #1e293b;
    margin-right: auto;
    align-self: flex-start;
}

.cnt-btn { 
    width: fit-content; 
    padding: 6px 10px; 
    margin: 0; 
    font-size: 12px; 
    border-radius: 8px; 
    border: 1px solid #334155; 
    background: #0f172a; 
    color: #cbd5e1; cursor: pointer; 
}
    
.cnt-btn:hover { 
    background: #1e293b; 
}

#inputArea {
    display: flex;
    padding: 10px;
    border-top: 1px solid #1e293b;
}

textarea {
    flex: 1;
    resize: none;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #1e293b;
    background: #020617;
    color: #e2e8f0;
}

button {
    margin-left: 10px;
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:disabled {
    opacity: 0.5;
}

.loader {
    width: 16px;
    height: 16px;
    border: 3px solid #334155;
    border-top: 3px solid #2563eb;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

#modal {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

#modalContent {
    background: #020617;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
}

input, label {
    display: block;
    width: 100%;
    margin-bottom: 10px;
}

input[type="text"] {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #1e293b;
    background: #020617;
    color: #e2e8f0;
}
</style>
</head>

<body>

<header>
    <div>LLM Chat</div>

    <div id="headerRight">
        <div id="trash" title="Clear chat" onclick="clearChat()">🗑️</div>
        <div id="gear" title="Settings" onclick="openModal()">⚙️</div>
    </div>
</header>

<div id="chat"></div>

<div id="inputArea">
    <textarea id="prompt" rows="2" placeholder="Type here..." title="Type here"></textarea>
    <button id="sendBtn" title="Send message" onclick="sendPrompt()">Send</button>
</div>

<div id="modal">
    <div id="modalContent">
        <h3>Settings</h3>

        <input id="ipInput" type="text" placeholder="Server IP">
        <input id="portInput" type="text" placeholder="Port">

        <label>
            <input type="checkbox" id="memoryToggle">
            Enable AI memory
        </label>

        <label>
            <input type="checkbox" id="directModeToggle">
            Direct mode (no prompt filters)
        </label>

        <button onclick="saveConfig()">Save</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const textarea = document.getElementById("prompt");
const button = document.getElementById("sendBtn");

let serverIP = localStorage.getItem("serverIP") || "192.168.1.130";
let serverPort = localStorage.getItem("serverPort") || "8000";

let memoryEnabled = localStorage.getItem("memoryEnabled");
memoryEnabled = memoryEnabled === null ? true : (memoryEnabled === "true");

let directMode = localStorage.getItem("directMode");
directMode = directMode === "true";

let conversationHistory = [];

if (memoryEnabled) {
    conversationHistory = JSON.parse(localStorage.getItem("history")) || [];

    conversationHistory.forEach(m => {
        addMessage(m.content, m.role === "user" ? "user" : "ai");
    });
}

function saveHistory() {
    if (!memoryEnabled) return;
    localStorage.setItem("history", JSON.stringify(conversationHistory));
}

function getURL() {
    return `http://${serverIP}:${serverPort}/query`;
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    div.title = `${type.toUpperCase()}: ${text}`;
    chat.appendChild(div);

    if (type === "ai") {
        const copyBtn = document.createElement("button");
        copyBtn.className = "cnt-btn";
        copyBtn.innerText = "Continue response";
        copyBtn.title = "Continue response in case it's cut off";
        copyBtn.onclick = () => {
            textarea.value = text;
            textarea.focus();
            textarea.setSelectionRange(textarea.value.length, textarea.value.length);
            sendPrompt(true);
        };
        chat.appendChild(copyBtn);
    }

    chat.scrollTop = chat.scrollHeight;
}

function addLoader() {
    document.querySelectorAll(".cnt-btn").forEach(btn => btn.remove());
    const div = document.createElement("div");
    div.className = "message ai";
    div.innerHTML = '<div class="loader"></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

function cleanResponse(text, input) {
    let clean = text
        .replace(/<\|.*?\|>/g, "")
        .replace(/<s>/g, "")
        .replace(/<\/s>/g, "")
        .replace(/\[INST\]/g, "")
        .replace(/\[\/INST\]/g, "")
        .replace(/(^|\s)-p(?=\s|$)/g, " ")
        .replace(/\s+/g, " ")
        .trim();

    const leadingPromptRegex = new RegExp(
        '^["“]?\\s*' + input + '\\s*["”]?[\\s,:-]*',
        'i'
    );

    clean = clean.replace(leadingPromptRegex, "").trim();

    return clean;
}

function buildPrompt(userInput) {
    let prompt = "";

    for (let msg of conversationHistory) {
        if (msg.role === "user") {
            prompt += `<s>[INST] ${msg.content} [/INST]`;
        } else {
            prompt += ` ${msg.content} </s>`;
        }
    }

    prompt += `<s>[INST] ${userInput} [/INST]`;
    return prompt;
}

async function sendPrompt(isContinuation = false) {
    const input = textarea.value.trim();
    if (!input) return;

    if (!isContinuation) {
        addMessage(input, "user");
    }
    textarea.value = "";

    const loader = addLoader();
    button.disabled = true;

    const payload = directMode ? input : buildPrompt(input);

    try {
        const res = await fetch(getURL(), {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ prompt: payload })
        });

        const data = await res.json();

        let responseText = cleanResponse(data.response || "No response generated.", input);

        if (responseText === "") {
            responseText = "No response generated.";
        }

        loader.remove();
        addMessage(responseText, "ai");

        if (memoryEnabled) {
            conversationHistory.push({role: "user", content: input});
            conversationHistory.push({role: "ai", content: responseText});

            if (conversationHistory.length > 4) {
                conversationHistory = conversationHistory.slice(-4);
            }

            saveHistory();
        }

    } catch (err) {
        loader.remove();
        addMessage("Error: " + err.message, "ai");
    }

    button.disabled = false;
}

textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendPrompt();
    }
});

window.addEventListener("load", () => {
    textarea.focus();
});

function openModal() {
    modal.style.display = "flex";
    ipInput.value = serverIP;
    portInput.value = serverPort;
    memoryToggle.checked = memoryEnabled;
    directModeToggle.checked = directMode;
}

function saveConfig() {
    serverIP = ipInput.value || "192.168.1.130";
    serverPort = portInput.value || "8000";

    memoryEnabled = memoryToggle.checked;
    directMode = directModeToggle.checked;

    localStorage.setItem("serverIP", serverIP);
    localStorage.setItem("serverPort", serverPort);
    localStorage.setItem("memoryEnabled", memoryEnabled);
    localStorage.setItem("directMode", directMode);

    modal.style.display = "none";
}

function clearChat() {
    chat.innerHTML = "";
    conversationHistory = [];
    localStorage.removeItem("history");

    textarea.focus();
}
</script>

</body>
</html>
